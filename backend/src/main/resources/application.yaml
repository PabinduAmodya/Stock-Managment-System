spring:
  application:
    name: Stock_Managment

  datasource:
    url: jdbc:mysql://localhost:3306/stock_management_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

server:
  port: 8080


app:
  jwt:
    secret: StockManagementSuperSecretKeyForJWTTokenGeneration2024!
    expiration: 86400000
